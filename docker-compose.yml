services:
  postgres:
    image: postgres:16-alpine
    container_name: openged-postgres
    environment:
      POSTGRES_DB: openged
      POSTGRES_USER: openged
      POSTGRES_PASSWORD: openged
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U openged -d openged']
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: openged-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: openged
      MINIO_ROOT_PASSWORD: openged123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    container_name: openged-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 openged openged123 &&
      mc mb -p local/openged || true
      "
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: openged-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      DATABASE_URL: postgresql://openged:openged@postgres:5432/openged
      JWT_SECRET: change-me-in-production
      JWT_TTL: 15m
      REFRESH_TOKEN_TTL: 7d
      AUTH_MODE: LOCAL_ONLY
      MASTER_ENCRYPTION_KEY: replace-with-32-byte-minimum-key
      FORCE_HTTPS: "false"
      STORAGE_PROVIDER: s3
      LOCAL_STORAGE_ROOT: ./storage
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: openged
      S3_ACCESS_KEY: openged
      S3_SECRET_KEY: openged123
      S3_FORCE_PATH_STYLE: "true"
      SEARCH_ENABLED: "false"
      SEARCH_URL: http://opensearch:9200
      SEARCH_INDEX_NAME: openged-documents
      SSO_ENABLED: "false"
      SSO_PROVIDER: oidc
      EMAIL_ENABLED: "false"
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
    container_name: openged-frontend
    ports:
      - '5173:80'
    depends_on:
      backend:
        condition: service_healthy

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: openged-opensearch
    profiles: ['search']
    environment:
      discovery.type: single-node
      plugins.security.disabled: 'true'
      OPENSEARCH_JAVA_OPTS: '-Xms512m -Xmx512m'
    ports:
      - '9200:9200'

volumes:
  postgres_data:
  minio_data:
